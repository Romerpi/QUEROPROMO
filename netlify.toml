[build]
  command = "npm run build && node scripts/generate-spa-shell.mjs"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback (também há public/_redirects)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache agressivo para assets com hash
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
